profile: current
runtime:
  composeFile: ./docker-compose.yml
  dataDir: ../ollama_data
  endpoint: http://localhost:11434
  containerName: ollama
host:
  os: ubuntu-24.x
  gpu: nvidia
  vram: 8GB
models:
  chat:
    - mistral-nemo
    - codestral:22b-v0.1-q4_K_M
  autocomplete:
    - starcoder2:3b
    - qwen2.5-coder:1.5b
  embedding:
    - nomic-embed-text
notes:
  - Keep ollama_data outside the AI folder to avoid accidental repo commits.
  - Update this file whenever model choices change.
